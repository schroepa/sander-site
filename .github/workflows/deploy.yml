name: Build & Deploy

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [cms_content_updated]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-workspaces

      - name: Download CMS pages from live server
        run: |
          sudo apt-get install -y lftp
          # Verbindungslimit auf 4 setzen (SiteGround erlaubt max. 8 pro IP)
          # cmd:fail-exit entfernt – Sicherheitscheck übernimmt die Fehlerprüfung
          # Anführungszeichen um Glob-Muster entfernt (Literalzeichen-Bug in lftp)
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
            -e "set ftp:ssl-allow no; set net:timeout 30; set net:max-retries 3; set net:connection-limit 4; mirror --verbose --no-perms --exclude-glob=*.jpg --exclude-glob=*.jpeg --exclude-glob=*.png --exclude-glob=*.gif --exclude-glob=*.webp --exclude-glob=*.svg --exclude-glob=*.ico --exclude-glob=*.mp4 --exclude-glob=*.pdf --exclude-glob=*.save ${{ secrets.FTP_CMS_PATH }}pages cms/user/pages; quit" \
            ${{ secrets.FTP_SERVER }} || true

          # Sicherheitscheck: Bricht den Build ab wenn der Download fehlgeschlagen ist
          if [ ! -f "cms/user/pages/01.home/homepage.md" ]; then
            echo "FEHLER: CMS-Download fehlgeschlagen – homepage.md nicht gefunden."
            echo "Der Build wird abgebrochen, um zu verhindern, dass ein veralteter Stand deployed wird."
            exit 1
          fi
          echo "CMS-Download erfolgreich: $(find cms/user/pages -name '*.md' | wc -l) Markdown-Dateien geladen."

      - name: Download CMS site config from live server
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
            -e "set ftp:ssl-allow no; set net:timeout 30; set net:max-retries 3; \
                mirror --no-recursion --no-perms --include-glob=site.yaml \
                ${{ secrets.FTP_CMS_PATH }}config/ cms/user/config/; \
                quit" \
            ${{ secrets.FTP_SERVER }} || true

          if grep -q 'menus:' cms/user/config/site.yaml; then
            echo "site.yaml download erfolgreich – Navigation-Struktur gefunden."
          else
            echo "WARNUNG: site.yaml heruntergeladen, aber keine 'menus:'-Sektion. Prüfen!"
          fi

      - name: Debug – meta.yaml mit gesetzten Alt-Texten
        run: |
          echo "=== meta.yaml Dateien mit nicht-leerem alt-Tag ==="
          grep -rl "alt:" cms/user/pages/01.home/*.meta.yaml 2>/dev/null | while read f; do
            alt=$(grep "^alt:" "$f" | head -1)
            if echo "$alt" | grep -qv "alt: ''$\|alt: $"; then
              echo "$f → $alt"
            fi
          done || echo "Keine meta.yaml mit gesetztem alt gefunden"

      - name: Build
        working-directory: frontend
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: npm run build

      # Rollback auf SamKirkland/FTP-Deploy-Action: Verwendet Sync-State-Datei
      # auf dem Server (.ftp-deploy-sync-state.json) für echte inkrementelle
      # Uploads. Vorher mit lftp wurden alle Dateien hochgeladen, weil
      # `git checkout` alle mtimes auf "jetzt" setzt und `--only-newer` dann
      # alles als neuer einstuft.
      #
      # SAFETY: dangerous-clean-slate ist standardmäßig FALSE → keine Löschungen
      # von Server-Files, die nicht in der Sync-State stehen. Alle admin-managed
      # Pfade sind explizit excluded.

      - name: Deploy Frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend/dist/
          server-dir: ${{ secrets.FTP_PATH }}
          # SAFETY: cms/ und user/ explizit excluden, falls FTP_PATH überlappt
          exclude: |
            **/.git*
            **/.git*/**
            **/cms/**
            **/user/**

      - name: Deploy CMS via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: cms/user/
          server-dir: ${{ secrets.FTP_CMS_PATH }}
          # SAFETY: Alle admin-managed und runtime Pfade ausschließen
          # - pages/**       → wird via Download synchronisiert (User editiert im Backend)
          # - accounts/**    → Admin-Login, sensibel
          # - config/plugins/admin.yaml → vom Grav-Admin-Plugin verwaltet (Server-Lock)
          # - **/*.meta.yaml → Grav generiert diese zur Laufzeit
          # - **/*.save      → Backup-Dateien
          # - cache/**, logs/**, tmp/**, backup/** → Runtime-Daten
          exclude: |
            **/.git*
            **/.git*/**
            pages/**
            accounts/**
            config/site.yaml
            config/plugins/admin.yaml
            config/plugins/nav-webhook.yaml
            **/*.meta.yaml
            **/*.save
            cache/**
            logs/**
            tmp/**
            backup/**

      - name: Clear Grav Cache via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_CMS_PATH: ${{ secrets.FTP_CMS_PATH }}
        run: |
          # Grav-Cache löschen: liegt eine Ebene über FTP_CMS_PATH (user/ → ../cache/)
          # glob rm -rf löscht alle Unterverzeichnisse; || true verhindert Build-Fehler
          # wenn cache/ leer oder nicht vorhanden ist
          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" \
            -e "set ftp:ssl-allow no; set net:timeout 30; set net:max-retries 2; \
                glob -a rm -rf ${FTP_CMS_PATH}../cache/*; \
                quit" \
            "$FTP_SERVER" || true
          echo "Grav Cache gelöscht."
