name: Build & Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/15 * * * *'
  repository_dispatch:
    types: [cms_content_updated]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-workspaces

      - name: Download CMS pages from live server
        run: |
          sudo apt-get install -y lftp
          # Verbindungslimit auf 4 setzen (SiteGround erlaubt max. 8 pro IP)
          # cmd:fail-exit entfernt – Sicherheitscheck übernimmt die Fehlerprüfung
          # Anführungszeichen um Glob-Muster entfernt (Literalzeichen-Bug in lftp)
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
            -e "set ftp:ssl-allow no; set net:timeout 30; set net:max-retries 3; set ftp:connection-limit 4; mirror --verbose --no-perms --exclude-glob=*.jpg --exclude-glob=*.jpeg --exclude-glob=*.png --exclude-glob=*.gif --exclude-glob=*.webp --exclude-glob=*.svg --exclude-glob=*.ico --exclude-glob=*.mp4 --exclude-glob=*.pdf --exclude-glob=*.meta.yaml --exclude-glob=*.save ${{ secrets.FTP_CMS_PATH }}pages cms/user/pages; quit" \
            ${{ secrets.FTP_SERVER }} || true

          # Sicherheitscheck: Bricht den Build ab wenn der Download fehlgeschlagen ist
          if [ ! -f "cms/user/pages/01.home/homepage.md" ]; then
            echo "FEHLER: CMS-Download fehlgeschlagen – homepage.md nicht gefunden."
            echo "Der Build wird abgebrochen, um zu verhindern, dass ein veralteter Stand deployed wird."
            exit 1
          fi
          echo "CMS-Download erfolgreich: $(find cms/user/pages -name '*.md' | wc -l) Markdown-Dateien geladen."

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy Frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend/dist/
          server-dir: ${{ secrets.FTP_PATH }}
          exclude: |
            **/.git*
            **/.git*/**

      - name: Deploy CMS via lftp
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_CMS_PATH: ${{ secrets.FTP_CMS_PATH }}
        run: |
          # CMS-Deploy via lftp mirror --reverse (upload)
          # Volle Kontrolle über Timeouts und Connection-Limit (SiteGround max. 8)
          # Ausgeschlossen: pages/ (via Download gepflegt), accounts/ (sensibel),
          # *.meta.yaml und *.save (Grav-interne Dateien, die nie angefasst werden sollen)
          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" \
            -e "set ftp:ssl-allow no; \
                set net:timeout 60; \
                set net:max-retries 3; \
                set net:reconnect-interval-base 5; \
                set ftp:connection-limit 4; \
                set mirror:parallel-transfer-count 2; \
                mirror --reverse --verbose --no-perms --only-newer \
                  --exclude-glob=.git* \
                  --exclude=^pages/ \
                  --exclude=^accounts/ \
                  --exclude-glob=*.meta.yaml \
                  --exclude-glob=*.save \
                  cms/user/ $FTP_CMS_PATH; \
                quit" \
            "$FTP_SERVER"
          echo "CMS-Deploy abgeschlossen."
