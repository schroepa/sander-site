name: GitHub Deploy
version: 1.0.0
description: Triggers a GitHub Actions rebuild whenever content is saved in the Grav admin.
author:
  name: Sander Catering
slug: github-deploy
type: plugin
dependencies:
  - { name: grav, version: '>=1.7.0' }

form:
  validation: strict
  fields:
    enabled:
      type: toggle
      label: Plugin aktiviert
      highlight: 1
      default: 1
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool

    token:
      type: text
      label: GitHub Personal Access Token
      help: 'Token mit "repo" Scope – erstellen unter github.com → Settings → Developer settings → Personal access tokens'
      placeholder: 'ghp_...'

    repository:
      type: text
      label: GitHub Repository
      help: 'Format: owner/repository-name'
      placeholder: 'schroepa/sander-site'
