title: Homepage
"@extends":
  type: default
  context: "blueprints://pages"

form:
  fields:
    tabs:
      type: tabs
      active: 1

      fields:
        content:
          type: tab
          title: Content

          fields:
            # ── Section Order ──
            section_order_section:
              type: section
              title: "🔢 Reihenfolge der Sections"
              underline: true

            section_order_help:
              type: display
              label: ""
              content: "Ziehe die Einträge per **Drag & Drop** (≡) in die gewünschte Reihenfolge. Die Seite wird genau in dieser Reihenfolge aufgebaut."
              markdown: true

            header.section_order:
              type: list
              label: Abschnitte
              style: vertical
              fields:
                .section:
                  type: select
                  label: Abschnitt
                  validate:
                    required: true
                  options:
                    hero: "🎬 Hero"
                    stats: "📊 Kennzahlen"
                    menu_slider: "🎞️ Menu Slider"
                    solutions: "✅ Herausforderungen & Lösungen"
                    smart_catering: "🧑‍🍳 Smart Catering"
                    sticky_scroll: "🖱️ Sticky Scroll"
                    cta_1: "📣 CTA 1"
                    cta_2: "📣 CTA 2"
                    cta_3: "📣 CTA 3"
                    about: "🏢 Rosin"
                    team: "👥 Team"
                    text_section: "📝 Text Section"
                    logo_section: "🏢 Logo Section"
                    awards: "🏆 Auszeichnungen"
                    faq: "❓ FAQ"
                    split_sections: "🖼️ Split Sections"
                    cards_section: "🗂️ Karten-Grid"

            # ── Hero ──
            hero_section:
              type: section
              title: "🎬 Hero"
              underline: true

            header.hero.headline:
              type: text
              label: Headline
              placeholder: "z.B. Premium Catering für jeden Anlass"
              validate:
                required: true

            header.hero.subline:
              type: text
              label: Subline
              placeholder: "z.B. Qualität, die man schmeckt"

            hero_scale_columns:
              type: columns
              fields:
                col_headline_scale:
                  type: column
                  fields:
                    header.hero.headline_scale:
                      type: text
                      label: Headline Scale
                      placeholder: "1.0"
                      help: "Vergrößert/verkleinert die Überschrift (z.B. 1.2 = 20% größer)."
                      default: "1.0"
                col_subline_scale:
                  type: column
                  fields:
                    header.hero.subline_scale:
                      type: text
                      label: Subline Scale
                      placeholder: "1.0"
                      help: "Vergrößert/verkleinert die Unterüberschrift (z.B. 0.8 = 20% kleiner)."
                      default: "1.0"
                col_spacing:
                  type: column
                  fields:
                    header.hero.headline_subline_spacing:
                      type: text
                      label: Headline–Subline Abstand
                      placeholder: "1.5"
                      help: "Abstand in rem (z.B. 1.5 oder 2)."
                      default: "1.5"

            header.hero.show_cta:
              type: toggle
              label: Call-to-Action Button anzeigen
              highlight: 1
              default: 0
              options:
                1: Ja
                0: Nein

            hero_cta_columns:
              type: columns
              fields:
                col_cta_text:
                  type: column
                  fields:
                    header.hero.cta_text:
                      type: text
                      label: Button Text
                      placeholder: "z.B. Jetzt anfragen"
                col_cta_link:
                  type: column
                  fields:
                    header.hero.cta_link:
                      type: text
                      label: Button Link
                      placeholder: "#kontakt"

            # ── Stats / Kennzahlen ──
            stats_section:
              type: section
              title: "📊 Kennzahlen"
              underline: true

            header.stats.items:
              type: list
              label: Kennzahlen
              style: vertical
              fields:
                .value:
                  type: number
                  label: Zahlenwert
                  placeholder: "50"
                  validate:
                    required: true

                .suffix:
                  type: text
                  label: Suffix
                  placeholder: "+"
                  help: "Zeichen nach der Zahl, z.B. '+' oder '%'"

                .separator:
                  type: toggle
                  label: Tausender-Trennzeichen
                  highlight: 1
                  default: 0
                  options:
                    1: Ja
                    0: Nein
                  help: "Aktivieren für Zahlen wie 2.500"

                .label:
                  type: text
                  label: Bezeichnung
                  placeholder: "Jahre Erfahrung"
                  validate:
                    required: true

            stats_bg_media:
              type: pagemedia
              label: "Hintergrundbild hochladen"

            header.stats.background_image:
              type: mediapicker
              label: Hintergrundbild (optional)
              help: "Bild zuerst oben hochladen, dann hier auswählen"

            header.stats.background_overlay:
              type: toggle
              label: Dunkles Overlay aktivieren
              highlight: 1
              default: 1
              options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
              validate:
                type: bool

            # ── Solutions ──
            solutions_section:
              type: section
              title: "✅ Herausforderungen & Lösungen"
              underline: true

            header.solutions.headline:
              type: text
              label: Überschrift
              placeholder: "Deine Herausforderung - Unsere Lösungen"

            header.solutions.subline:
              type: text
              label: Unterüberschrift
              placeholder: "Hier werden Sie geholfen"

            header.solutions.items:
              type: list
              label: Challenge / Solution Paare
              style: vertical
              fields:
                .challenge_title:
                  type: text
                  label: Herausforderung – Titel
                  placeholder: "z.B. Küche kaputt oder nicht vorhanden?"

                .challenge_text:
                  type: editor
                  label: Herausforderung – Beschreibung

                .solution_title:
                  type: text
                  label: Lösung – Titel
                  placeholder: "z.B. Smart Catering fängt genau das ab."

                .solution_text:
                  type: editor
                  label: Lösung – Beschreibung

            solutions_bg_media:
              type: pagemedia
              label: "Hintergrundbild hochladen"

            header.solutions.background_image:
              type: mediapicker
              label: Hintergrundbild (optional)
              help: "Bild zuerst oben hochladen, dann hier auswählen"

            header.solutions.background_overlay:
              type: toggle
              label: Dunkles Overlay aktivieren
              highlight: 1
              default: 1
              options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
              validate:
                type: bool

            # ── Menu Slider ──
            menu_slider_section:
              type: section
              title: "🎞️ Menu Slider"
              underline: true

            header.menu_slider.headline:
              type: text
              label: Überschrift
              placeholder: "z.B. Unsere Menülinien im Überblick"

            menu_slider_media:
              type: pagemedia
              label: "Slider Bilder hochladen"

            header.menu_slider.items:
              type: list
              label: Slides
              style: vertical
              fields:
                .title:
                  type: text
                  label: Slide Titel
                  placeholder: "z.B. Regionale Küche"
                  validate:
                    required: true

                .subtitle:
                  type: text
                  label: Slide Untertitel
                  placeholder: "z.B. Frisch aus der Region. Traditionell modern."

                .image:
                  type: mediapicker
                  label: Bild auswählen
                  help: "Wähle ein über 'Slider Bilder hochladen' hochgeladenes Bild aus"

            # ── Smart Catering ──
            smart_catering_section:
              type: section
              title: "🧑‍🍳 Smart Catering"
              underline: true

            header.smart_catering.headline:
              type: text
              label: Überzeile
              placeholder: "Verantwortung & Entscheidungsdruck"

            header.smart_catering.title:
              type: text
              label: Haupttitel
              placeholder: "SMART CATERING"

            header.smart_catering.subline:
              type: text
              label: Unterzeile
              placeholder: "Intelligent gelöst. Köstlich geliefert."

            header.smart_catering.columns:
              type: list
              label: Spalten
              style: vertical
              fields:
                .title:
                  type: text
                  label: Spalten-Titel
                  placeholder: "z.B. Smart Catering"

                .subline:
                  type: text
                  label: Spalten-Unterzeile
                  placeholder: "z.B. Hauptverpflegung"

                .accordions:
                  type: list
                  label: Akkordeons
                  style: vertical
                  fields:
                    .title:
                      type: text
                      label: Akkordeon-Titel
                      placeholder: "z.B. Menükompositionen"

                    .content:
                      type: editor
                      label: Inhalt (Optional)

                    .image:
                      type: mediapicker
                      label: Bild (Optional)
                      help: "Bild zuerst oben über 'Hintergrundbild hochladen' hochladen, dann hier auswählen"

                    .cards:
                      type: list
                      label: Karten (Optional)
                      style: vertical
                      fields:
                        .title:
                          type: text
                          label: Karten-Titel

                        .text:
                          type: textarea
                          label: Karten-Text
                          rows: 3

            smart_catering_bg_media:
              type: pagemedia
              label: "Hintergrundbild hochladen"

            header.smart_catering.background_image:
              type: mediapicker
              label: Hintergrundbild (optional)
              help: "Bild zuerst oben hochladen, dann hier auswählen"

            header.smart_catering.background_overlay:
              type: toggle
              label: Dunkles Overlay aktivieren
              highlight: 1
              default: 1
              options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
              validate:
                type: bool

            # ── Sticky Scroll ──
            sticky_scroll_section:
              type: section
              title: "🖱️ Sticky Scroll"
              underline: true

            header.sticky_scroll.overline:
              type: text
              label: Überzeile
              placeholder: "z.B. Frische Manufaktur"
              help: "Kleiner Begleittext über der Überschrift"

            header.sticky_scroll.headline:
              type: text
              label: Überschrift
              placeholder: "Was ist deine Herausforderung?"

            header.sticky_scroll.subline:
              type: textarea
              label: Unterzeile
              rows: 3
              placeholder: "Beschreibungstext…"

            header.sticky_scroll.items:
              type: list
              label: Scroll-Einträge
              style: vertical
              fields:
                .dropdown_label:
                  type: text
                  label: Navigations-Label
                  placeholder: "Infrastrukturdefizit"

                .title:
                  type: text
                  label: Karten-Titel
                  placeholder: "Küche kaputt oder nicht vorhanden?"

                .subtitle:
                  type: text
                  label: Karten-Unterzeile

                .body_bold:
                  type: editor
                  label: Fettgedruckter Text

                .body_text:
                  type: editor
                  label: Regulärer Text

            # ── Call to Action ──
            cta_section:
              type: section
              title: "📣 Call to Action"
              underline: true

            cta_media:
              type: pagemedia
              label: "Bilder für CTA-Sections hochladen (Illustration & Hintergrund)"

            header.ctas:
              type: list
              label: CTA-Sections
              style: vertical
              help: "Jeder Eintrag erzeugt eine eigene CTA-Section. Reihenfolge im Abschnitt-Sortierer bestimmt die Position auf der Seite – alle CTAs erscheinen als Gruppe dort."
              fields:
                .headline:
                  type: text
                  label: Überschrift
                  placeholder: "Welche Module benötigst du?"

                .copy:
                  type: editor
                  label: Beschreibungstext

                .button_text:
                  type: text
                  label: Button Text
                  placeholder: "Jetzt Kontakt aufnehmen"

                .button_link:
                  type: text
                  label: Button Link
                  placeholder: "#kontakt"

                .illustration_image:
                  type: text
                  label: Illustration – Dateiname (optional, ersetzt SVG-Grafik)
                  placeholder: "z.B. mein-bild.jpg"
                  help: "Bild oben über 'Bilder hochladen' hochladen, dann hier nur den Dateinamen eintragen."

                .background_image:
                  type: text
                  label: Hintergrundbild – Dateiname (optional)
                  placeholder: "z.B. hintergrund.jpg"
                  help: "Bild oben über 'Bilder hochladen' hochladen, dann hier nur den Dateinamen eintragen."

                .background_overlay:
                  type: toggle
                  label: Dunkles Overlay aktivieren
                  highlight: 1
                  default: 1
                  options:
                    1: PLUGIN_ADMIN.ENABLED
                    0: PLUGIN_ADMIN.DISABLED
                  validate:
                    type: bool

            # ── Rosin ──
            about_section:
              type: section
              title: "🏢 Rosin"
              underline: true

            header.about.headline:
              type: text
              label: Überschrift
              placeholder: "Wer wir sind"

            header.about.body:
              type: editor
              label: Text

            about_media:
              type: pagemedia
              label: "Bild hochladen"

            header.about.image:
              type: mediapicker
              label: Bild (rechte Spalte)
              help: "Bild zuerst hochladen, dann hier auswählen."

            header.about.background_image:
              type: mediapicker
              label: Hintergrundbild (optional)
              help: "Bild zuerst hochladen, dann hier auswählen"

            header.about.background_overlay:
              type: toggle
              label: Dunkles Overlay aktivieren
              highlight: 1
              default: 1
              options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
              validate:
                type: bool

            header.about.quote:
              type: textarea
              label: Zitat
              rows: 3
              placeholder: "z.B. Qualität ist keine Selbstverständlichkeit – sie ist eine Haltung."
              help: "Wird in Anführungszeichen über die volle Breite angezeigt."

            header.about.quote_author:
              type: text
              label: Zitat-Urheber
              placeholder: "z.B. Hans Rosin, Gründer"

            # ── Auszeichnungen ──
            awards_section:
              type: section
              title: "🏆 Auszeichnungen"
              underline: true

            header.awards.headline:
              type: text
              label: Überschrift
              placeholder: "z.B. Ein Ausgezeichnetes Familienunternehmen"

            awards_media:
              type: pagemedia
              label: "Badge-Bilder hochladen"

            header.awards.items:
              type: list
              label: Auszeichnungen
              style: vertical
              fields:
                .label:
                  type: text
                  label: Beschriftung
                  placeholder: "z.B. Best of Market 2026"

                .image:
                  type: mediapicker
                  label: Badge-Bild
                  help: "Bild zuerst hochladen, dann hier auswählen"

                .description:
                  type: textarea
                  label: Beschreibung
                  rows: 3
                  placeholder: "Kurze Erklärung zur Auszeichnung..."

            awards_bg_media:
              type: pagemedia
              label: "Hintergrundbild hochladen"

            header.awards.background_image:
              type: mediapicker
              label: Hintergrundbild (optional)
              help: "Bild zuerst oben hochladen, dann hier auswählen"

            header.awards.background_overlay:
              type: toggle
              label: Dunkles Overlay aktivieren
              highlight: 1
              default: 1
              options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
              validate:
                type: bool

            # ── Team ──
            team_section:
              type: section
              title: "👥 Team"
              underline: true

            header.team.headline:
              type: text
              label: Überschrift
              placeholder: "Die Menschen hinter Sander"

            header.team.subline:
              type: text
              label: Unterzeile
              placeholder: "Erfahrung, Leidenschaft und echtes Gastgeber-Herz."

            team_media:
              type: pagemedia
              label: "Team-Fotos hochladen"

            header.team.items:
              type: list
              label: Teammitglieder
              style: vertical
              fields:
                .name:
                  type: text
                  label: Name
                  placeholder: "z.B. Michael Sander"
                  validate:
                    required: true

                .role:
                  type: text
                  label: Funktion / Position
                  placeholder: "z.B. Geschäftsführer"

                .bio:
                  type: editor
                  label: Kurzbeschreibung (optional)

                .image:
                  type: mediapicker
                  label: Profilfoto (optional)
                  help: "Bild zuerst hochladen, dann hier auswählen"

            team_bg_media:
              type: pagemedia
              label: "Hintergrundbild hochladen"

            header.team.background_image:
              type: mediapicker
              label: Hintergrundbild (optional)
              help: "Bild zuerst oben hochladen, dann hier auswählen"

            header.team.background_overlay:
              type: toggle
              label: Dunkles Overlay aktivieren
              highlight: 1
              default: 1
              options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
              validate:
                type: bool

            # ── Logo Section ──
            logo_section_section:
              type: section
              title: "🏢 Logo Section"
              underline: true

            header.logo_section.headline:
              type: text
              label: Überschrift (optional)
              placeholder: "z.B. Unsere Partner"

            header.logo_section.logo_color:
              type: colorpicker
              label: Logo-Farbe
              default: "#f1eef0"
              help: "Farbe, in der alle Logos eingefärbt werden (Hex-Wert)"

            logo_section_media:
              type: pagemedia
              label: "Logo-Dateien hochladen (SVG empfohlen)"

            header.logo_section.items:
              type: list
              label: Logos
              style: vertical
              fields:
                .name:
                  type: text
                  label: Name / Alt-Text
                  placeholder: "z.B. Sander Gourmet"
                  validate:
                    required: true

                .image:
                  type: filepicker
                  label: Logo-Datei
                  folder: "user://pages/01.home"
                  accept:
                    - image/*
                    - .svg
                  help: "SVG- oder Bilddatei auswählen (zuerst hochladen)"

            logo_section_bg_media:
              type: pagemedia
              label: "Hintergrundbild hochladen"

            header.logo_section.background_image:
              type: mediapicker
              label: Hintergrundbild (optional)
              help: "Bild zuerst oben hochladen, dann hier auswählen"

            header.logo_section.background_overlay:
              type: toggle
              label: Dunkles Overlay aktivieren
              highlight: 1
              default: 1
              options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
              validate:
                type: bool

            # ── Text Section ──
            text_section_section:
              type: section
              title: "📝 Text Section"
              underline: true

            header.text_section.headline:
              type: text
              label: Überschrift
              placeholder: "z.B. Gemeinsam Qualität gestalten."

            text_section_bg_media:
              type: pagemedia
              label: "Hintergrundbild hochladen"

            header.text_section.background_image:
              type: mediapicker
              label: Hintergrundbild (optional)
              help: "Bild zuerst oben hochladen, dann hier auswählen"

            header.text_section.background_overlay:
              type: toggle
              label: Dunkles Overlay aktivieren
              highlight: 1
              default: 1
              options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
              validate:
                type: bool

            header.text_section.paragraphs:
              type: list
              label: Textabsätze
              style: vertical
              help: "Jeder Eintrag wird als eigener Absatz dargestellt."
              fields:
                .text:
                  type: editor
                  label: Absatz

            # ── Karten-Grid (Figma Section) ──
            cards_section_section:
              type: section
              title: "🗂️ Karten-Grid"
              underline: true

            header.cards_section.overline:
              type: text
              label: Überzeile
              placeholder: "z.B. Digitalisierung & Innovation"

            header.cards_section.headline:
              type: text
              label: Überschrift
              placeholder: "z.B. Digitalisierung & Innavation"

            header.cards_section.subline:
              type: text
              label: Unterzeile
              placeholder: "z.B. Mit digitalen Lösungen für die Zukunft..."

            cards_section_media:
              type: pagemedia
              label: "Bilder für Karten und Hintergrund hochladen"

            header.cards_section.background_image:
              type: mediapicker
              label: Hintergrundbild (optional)
              help: "Bild zuerst oben hochladen, dann hier auswählen"

            header.cards_section.background_overlay:
              type: toggle
              label: Dunkles Overlay aktivieren
              highlight: 1
              default: 1
              options:
                1: Ja
                0: Nein

            header.cards_section.background_grayscale:
              type: toggle
              label: Hintergrundbild entsättigen (Graustufen)
              highlight: 0
              default: 0
              options:
                1: Ja
                0: Nein

            header.cards_section.items:
              type: list
              label: Karten
              style: vertical
              fields:
                .title:
                  type: text
                  label: Titel
                  placeholder: "z.B. Smart Catering App"
                  validate:
                    required: true

                .text:
                  type: textarea
                  label: Text
                  rows: 3
                  placeholder: "Beschreibungstext der Karte..."
                  validate:
                    required: true

                .image:
                  type: mediapicker
                  label: Bild (optional)
                  help: "Bild zuerst hochladen, dann hier auswählen"

            # ── FAQ Section ──
            faq_section_section:
              type: section
              title: "❓ FAQ"
              underline: true

            header.faq.headline:
              type: text
              label: Überschrift
              placeholder: "z.B. Häufig gestellte Fragen"

            header.faq.items:
              type: list
              label: Fragen & Antworten
              style: vertical
              fields:
                .question:
                  type: text
                  label: Frage
                  placeholder: "z.B. Wie funktioniert die Lieferung?"
                  validate:
                    required: true

                .answer:
                  type: editor
                  label: Antwort
                  rows: 4

            faq_bg_media:
              type: pagemedia
              label: "Hintergrundbild hochladen"

            header.faq.background_image:
              type: mediapicker
              label: Hintergrundbild (optional)
              help: "Bild zuerst oben hochladen, dann hier auswählen"

            header.faq.background_overlay:
              type: toggle
              label: Dunkles Overlay aktivieren
              highlight: 1
              default: 1
              options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
              validate:
                type: bool

            # ── Split Section ──
            split_sections_section:
              type: section
              title: "🖼️ Split Sections"
              underline: true

            header.split_sections:
              type: list
              label: Split Sections
              style: vertical
              help: "Jeder Eintrag erzeugt eine eigene Split-Sektion (Bild links oder rechts)."
              fields:
                .image_position:
                  type: select
                  label: Bildposition
                  default: left
                  options:
                    left: "◀ Bild links"
                    right: "Bild rechts ▶"

                .overline:
                  type: text
                  label: Überzeile (optional)
                  placeholder: "z.B. Unsere Manufaktur"

                .headline:
                  type: text
                  label: Überschrift
                  placeholder: "z.B. Frische, die man schmeckt."

                .subheadline:
                  type: text
                  label: Unterüberschrift
                  placeholder: "z.B. Täglich produziert. Direkt geliefert."

                .body:
                  type: list
                  label: Textabsätze
                  style: vertical
                  fields:
                    .text:
                      type: textarea
                      label: Absatz
                      rows: 4

                .cta_text:
                  type: text
                  label: Button Text
                  placeholder: "z.B. Mehr erfahren"

                .cta_link:
                  type: text
                  label: Button Link
                  placeholder: "#kontakt"

                .image:
                  type: mediapicker
                  label: Bild auswählen
                  help: "Bild zuerst über 'Split Sections Bilder hochladen' hochladen."

                .image_alt:
                  type: text
                  label: Bildbeschreibung (Alt-Text)
                  placeholder: "z.B. Frische Produkte aus der Sander Manufaktur"
