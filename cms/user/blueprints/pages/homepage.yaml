title: Homepage
"@extends":
  type: default
  context: "blueprints://pages"

form:
  fields:
    tabs:
      type: tabs
      active: 1

      fields:

        # ═══════════════════════════════════════════
        # TAB: Reihenfolge
        # ═══════════════════════════════════════════
        tab_order:
          type: tab
          title: "Reihenfolge"

          fields:
            order_info:
              type: display
              label: ""
              content: "Ziehe die Einträge per **Drag & Drop** (≡) in die gewünschte Reihenfolge. Die Seite wird genau in dieser Abfolge aufgebaut."
              markdown: true

            header.section_order:
              type: list
              label: Abschnitte
              style: vertical
              fields:
                .section:
                  type: select
                  label: Abschnitt
                  validate:
                    required: true
                  options:
                    hero: "Hero"
                    stats: "Kennzahlen"
                    menu_slider: "Menu Slider"
                    solutions: "✅ Herausforderungen & Lösungen"
                    smart_catering: "Smart Catering"
                    sticky_scroll: "Sticky Scroll"
                    cta_1: "📣 CTA 1"
                    cta_2: "📣 CTA 2"
                    cta_3: "📣 CTA 3"
                    about: "Rosin"
                    team: "Team"
                    text_section: "📝 Text Section"
                    logo_section: "🏢 Logo Section"
                    awards: "Auszeichnungen"
                    faq: "FAQ"
                    split_sections: "Split Sections"
                    cards_section: "🗂️ Karten-Grid"

        # ═══════════════════════════════════════════
        # TAB: Hero
        # ═══════════════════════════════════════════
        tab_hero:
          type: tab
          title: "Hero"

          fields:
            hero_content_divider:
              type: section
              title: "Texte"
              underline: true

            header.hero.headline:
              type: text
              label: Headline
              placeholder: "z.B. Betriebsgastronomie 4.0"
              validate:
                required: true

            header.hero.subline:
              type: text
              label: Subline
              placeholder: "z.B. Intelligent gelöst. Köstlich geliefert."

            header.hero.tags:
              type: list
              label: Tags
              help: "Tags erscheinen unter der Subline. Ohne # eingeben, z.B. «Catering» oder «Betriebsgastronomie»."
              style: vertical
              fields:
                .item:
                  type: text
                  placeholder: "z.B. Catering"

            hero_scale_columns:
              type: columns
              fields:
                col_headline_scale:
                  type: column
                  fields:
                    header.hero.headline_scale:
                      type: text
                      label: Headline-Größe
                      placeholder: "1.0"
                      help: "Skalierungsfaktor (1.0 = normal, 1.2 = 20% größer)"
                      default: "1.0"
                col_subline_scale:
                  type: column
                  fields:
                    header.hero.subline_scale:
                      type: text
                      label: Subline-Größe
                      placeholder: "1.0"
                      help: "Skalierungsfaktor (1.0 = normal, 0.8 = kleiner)"
                      default: "1.0"
                col_spacing:
                  type: column
                  fields:
                    header.hero.headline_subline_spacing:
                      type: text
                      label: Abstand Headline–Subline
                      placeholder: "1.5"
                      help: "In rem-Einheiten (z.B. 1.5 oder 2)"
                      default: "1.5"

            hero_cta_divider:
              type: section
              title: "Call-to-Action Button"
              underline: true

            header.hero.show_cta:
              type: toggle
              label: Button anzeigen
              highlight: 1
              default: 0
              options:
                1: Ja
                0: Nein

            hero_cta_columns:
              type: columns
              fields:
                col_cta_text:
                  type: column
                  fields:
                    header.hero.cta_text:
                      type: text
                      label: Button-Text
                      placeholder: "z.B. Jetzt anfragen"
                col_cta_link:
                  type: column
                  fields:
                    header.hero.cta_link:
                      type: text
                      label: Button-Link
                      placeholder: "#kontakt"

            hero_deco_divider:
              type: section
              title: "Dekorativer Hintergrundschriftzug"
              underline: true

            hero_deco_columns:
              type: columns
              fields:
                col_deco_color:
                  type: column
                  fields:
                    header.hero.deco_color:
                      type: colorpicker
                      label: Farbe
                      default: "#ad94a5"
                      help: "Farbe des dekorativen SVG-Schriftzugs"
                col_deco_width:
                  type: column
                  fields:
                    header.hero.deco_width:
                      type: number
                      label: Breite (vw)
                      placeholder: "110"
                      default: 110
                      help: "100 = Vollbreite, 110 = 10% überbreit"
                      validate:
                        min: 50
                        max: 300

            hero_bg_divider:
              type: section
              title: "Hintergrund"
              underline: true

            hero_bg_media:
              type: pagemedia
              label: "Bild oder Video hochladen"

            hero_bg_columns:
              type: columns
              fields:
                col_bg_image:
                  type: column
                  fields:
                    header.hero.background_image:
                      type: mediapicker
                      label: Hintergrundbild
                      help: "Fallback, wenn kein Video gesetzt ist"
                col_bg_video:
                  type: column
                  fields:
                    header.hero.background_video:
                      type: filepicker
                      label: Hintergrundvideo
                      folder: "user://pages/01.home"
                      accept:
                        - video/mp4
                        - video/webm
                        - .mp4
                        - .webm
                      help: "Video hat Vorrang vor Bild · stumm · Loop · Autoplay"

                    header.hero.background_video_speed:
                      type: text
                      label: Videotempo
                      placeholder: "1.0"
                      default: "1.0"
                      help: "0.5 = halbe Geschwindigkeit · 1.0 = normal · 2.0 = doppelt"

            hero_bg_options:
              type: columns
              fields:
                col_overlay:
                  type: column
                  fields:
                    header.hero.background_overlay:
                      type: toggle
                      label: Dunkles Overlay
                      highlight: 1
                      default: 1
                      options:
                        1: An
                        0: Aus
                      validate:
                        type: bool
                col_desaturate:
                  type: column
                  fields:
                    header.hero.background_desaturate:
                      type: toggle
                      label: Entsättigen (Graustufen)
                      highlight: 1
                      default: 0
                      help: "Wandelt Bild/Video in Graustufen um"
                      options:
                        1: An
                        0: Aus
                      validate:
                        type: bool

        # ═══════════════════════════════════════════
        # TAB: Kennzahlen
        # ═══════════════════════════════════════════
        tab_stats:
          type: tab
          title: "Kennzahlen"

          fields:
            stats_content_divider:
              type: section
              title: "Kennzahlen"
              underline: true

            header.stats.items:
              type: list
              label: Einträge
              style: vertical
              fields:
                .value:
                  type: number
                  label: Zahlenwert
                  placeholder: "50"
                  validate:
                    required: true

                .suffix:
                  type: text
                  label: Suffix (z.B. + oder %)
                  placeholder: "+"

                .separator:
                  type: toggle
                  label: Tausender-Trennzeichen (z.B. 2.500)
                  highlight: 1
                  default: 0
                  options:
                    1: Ja
                    0: Nein

                .label:
                  type: text
                  label: Bezeichnung
                  placeholder: "Jahre Erfahrung"
                  validate:
                    required: true

            stats_bg_divider:
              type: section
              title: "Hintergrund"
              underline: true

            stats_bg_media:
              type: pagemedia
              label: "Bild oder Video hochladen"

            stats_bg_columns:
              type: columns
              fields:
                col_bg_image:
                  type: column
                  fields:
                    header.stats.background_image:
                      type: mediapicker
                      label: Hintergrundbild
                      help: "Fallback, wenn kein Video gesetzt ist"
                col_bg_video:
                  type: column
                  fields:
                    header.stats.background_video:
                      type: filepicker
                      label: Hintergrundvideo
                      folder: "user://pages/01.home"
                      accept:
                        - video/mp4
                        - video/webm
                        - .mp4
                        - .webm
                      help: "Video hat Vorrang · stumm · Loop · Autoplay"

            header.stats.background_overlay:
              type: toggle
              label: Dunkles Overlay
              highlight: 1
              default: 1
              options:
                1: An
                0: Aus
              validate:
                type: bool

        # ═══════════════════════════════════════════
        # TAB: Menu Slider
        # ═══════════════════════════════════════════
        tab_menu_slider:
          type: tab
          title: "Menu Slider"

          fields:
            menu_slider_content_divider:
              type: section
              title: "Inhalt"
              underline: true

            header.menu_slider.headline:
              type: text
              label: Überschrift
              placeholder: "z.B. Unsere Menülinien im Überblick"

            menu_slider_media:
              type: pagemedia
              label: "Bilder oder Videos für die Slides hochladen"

            header.menu_slider.items:
              type: list
              label: Slides
              style: vertical
              fields:
                .title:
                  type: text
                  label: Titel
                  placeholder: "z.B. Regionale Küche"
                  validate:
                    required: true

                .subtitle:
                  type: text
                  label: Untertitel
                  placeholder: "z.B. Frisch aus der Region. Traditionell modern."

                .image:
                  type: mediapicker
                  label: Bild (optional)
                  help: "Fallback, wenn kein Video gesetzt ist"

                .video:
                  type: filepicker
                  label: Video (optional)
                  folder: "user://pages/01.home"
                  accept:
                    - video/mp4
                    - video/webm
                    - .mp4
                    - .webm
                  help: "Video hat Vorrang · stumm · Loop · Autoplay"

        # ═══════════════════════════════════════════
        # TAB: Lösungen
        # ═══════════════════════════════════════════
        tab_solutions:
          type: tab
          title: "Lösungen"

          fields:
            solutions_content_divider:
              type: section
              title: "Texte"
              underline: true

            header.solutions.headline:
              type: text
              label: Überschrift
              placeholder: "Deine Herausforderung – Unsere Lösungen"

            header.solutions.subline:
              type: text
              label: Unterzeile
              placeholder: "Hier werden Sie geholfen"

            header.solutions.items:
              type: list
              label: Herausforderung / Lösung Paare
              style: vertical
              fields:
                .challenge_title:
                  type: text
                  label: Herausforderung – Titel
                  placeholder: "z.B. Küche nicht vorhanden?"

                .challenge_text:
                  type: editor
                  label: Herausforderung – Beschreibung

                .solution_title:
                  type: text
                  label: Lösung – Titel
                  placeholder: "z.B. Smart Catering fängt genau das ab."

                .solution_text:
                  type: editor
                  label: Lösung – Beschreibung

            solutions_bg_divider:
              type: section
              title: "Hintergrund"
              underline: true

            solutions_bg_media:
              type: pagemedia
              label: "Bild oder Video hochladen"

            solutions_bg_columns:
              type: columns
              fields:
                col_bg_image:
                  type: column
                  fields:
                    header.solutions.background_image:
                      type: mediapicker
                      label: Hintergrundbild
                      help: "Fallback, wenn kein Video gesetzt ist"
                col_bg_video:
                  type: column
                  fields:
                    header.solutions.background_video:
                      type: filepicker
                      label: Hintergrundvideo
                      folder: "user://pages/01.home"
                      accept:
                        - video/mp4
                        - video/webm
                        - .mp4
                        - .webm
                      help: "Video hat Vorrang · stumm · Loop · Autoplay"

            header.solutions.background_overlay:
              type: toggle
              label: Dunkles Overlay
              highlight: 1
              default: 1
              options:
                1: An
                0: Aus
              validate:
                type: bool

        # ═══════════════════════════════════════════
        # TAB: Smart Catering
        # ═══════════════════════════════════════════
        tab_smart_catering:
          type: tab
          title: "Smart Catering"

          fields:
            smart_catering_content_divider:
              type: section
              title: "Texte"
              underline: true

            smart_catering_header_columns:
              type: columns
              fields:
                col_overline:
                  type: column
                  fields:
                    header.smart_catering.headline:
                      type: text
                      label: Überzeile
                      placeholder: "Verantwortung & Entscheidungsdruck"
                col_title:
                  type: column
                  fields:
                    header.smart_catering.title:
                      type: text
                      label: Haupttitel
                      placeholder: "SMART CATERING"
                col_subline:
                  type: column
                  fields:
                    header.smart_catering.subline:
                      type: text
                      label: Unterzeile
                      placeholder: "Intelligent gelöst. Köstlich geliefert."

            smart_catering_columns_divider:
              type: section
              title: "Spalten & Akkordeons"
              underline: true

            smart_catering_info:
              type: display
              label: ""
              content: "Jede Spalte kann mehrere Akkordeons enthalten. Jedes Akkordeon kann Inhalt, ein Bild und/oder Karten haben."
              markdown: true

            header.smart_catering.columns:
              type: list
              label: Spalten
              style: vertical
              fields:
                .title:
                  type: text
                  label: Spalten-Titel
                  placeholder: "z.B. Smart Catering"

                .subline:
                  type: text
                  label: Spalten-Unterzeile
                  placeholder: "z.B. Hauptverpflegung"

                .accordions:
                  type: list
                  label: Akkordeons
                  style: vertical
                  fields:
                    .title:
                      type: text
                      label: Akkordeon-Titel
                      placeholder: "z.B. Menükompositionen"

                    .content:
                      type: editor
                      label: Inhalt (optional)

                    .image:
                      type: mediapicker
                      label: Bild (optional)
                      help: "Zuerst unten unter 'Hintergrund' hochladen, dann hier auswählen"

                    .cards:
                      type: list
                      label: Karten (optional)
                      style: vertical
                      fields:
                        .title:
                          type: text
                          label: Karten-Titel

                        .text:
                          type: textarea
                          label: Karten-Text
                          rows: 3

                    .accordion_bg_image:
                      type: mediapicker
                      label: Hintergrundbild (optional)
                      help: "Zuerst unten unter 'Hintergrund' hochladen, dann hier auswählen"

                    .accordion_bg_options:
                      type: columns
                      fields:
                        col_overlay:
                          type: column
                          fields:
                            .accordion_bg_overlay:
                              type: toggle
                              label: Overlay
                              highlight: 1
                              default: true
                              options:
                                1: An
                                0: Aus

                        col_desaturate:
                          type: column
                          fields:
                            .accordion_bg_desaturate:
                              type: toggle
                              label: Entsättigen
                              highlight: 1
                              default: false
                              options:
                                1: An
                                0: Aus

            smart_catering_bg_divider:
              type: section
              title: "Hintergrund"
              underline: true

            smart_catering_bg_media:
              type: pagemedia
              label: "Bild oder Video hochladen (auch für Akkordeon-Bilder nutzbar)"

            smart_catering_bg_columns:
              type: columns
              fields:
                col_bg_image:
                  type: column
                  fields:
                    header.smart_catering.background_image:
                      type: mediapicker
                      label: Hintergrundbild
                      help: "Fallback, wenn kein Video gesetzt ist"
                col_bg_video:
                  type: column
                  fields:
                    header.smart_catering.background_video:
                      type: filepicker
                      label: Hintergrundvideo
                      folder: "user://pages/01.home"
                      accept:
                        - video/mp4
                        - video/webm
                        - .mp4
                        - .webm
                      help: "Video hat Vorrang · stumm · Loop · Autoplay"

            header.smart_catering.background_overlay:
              type: toggle
              label: Dunkles Overlay
              highlight: 1
              default: 1
              options:
                1: An
                0: Aus
              validate:
                type: bool

        # ═══════════════════════════════════════════
        # TAB: Sticky Scroll
        # ═══════════════════════════════════════════
        tab_sticky_scroll:
          type: tab
          title: "Sticky Scroll"

          fields:
            sticky_scroll_header_divider:
              type: section
              title: "Einleitung"
              underline: true

            header.sticky_scroll.overline:
              type: text
              label: Überzeile
              placeholder: "z.B. Frische Manufaktur"
              help: "Kleiner Text über der Hauptüberschrift"

            header.sticky_scroll.headline:
              type: text
              label: Überschrift
              placeholder: "Was ist deine Herausforderung?"

            header.sticky_scroll.subline:
              type: textarea
              label: Unterzeile
              rows: 3
              placeholder: "Beschreibungstext…"

            sticky_scroll_items_divider:
              type: section
              title: "Einträge"
              underline: true

            header.sticky_scroll.items:
              type: list
              label: Scroll-Einträge
              style: vertical
              fields:
                .dropdown_label:
                  type: text
                  label: Navigations-Label (Dropdown)
                  placeholder: "Infrastrukturdefizit"

                .title:
                  type: text
                  label: Karten-Titel
                  placeholder: "Küche kaputt oder nicht vorhanden?"

                .subtitle:
                  type: text
                  label: Karten-Unterzeile

                .body_bold:
                  type: editor
                  label: Fettgedruckter Text

                .body_text:
                  type: editor
                  label: Regulärer Text

        # ═══════════════════════════════════════════
        # TAB: CTAs
        # ═══════════════════════════════════════════
        tab_ctas:
          type: tab
          title: "CTAs"

          fields:
            cta_info:
              type: display
              label: ""
              content: "Jeder Eintrag erzeugt eine eigene CTA-Section. Im Tab **Reihenfolge** kannst du sie als **CTA 1**, **CTA 2**, **CTA 3** individuell platzieren."
              markdown: true

            cta_media:
              type: pagemedia
              label: "Bilder hochladen (Illustration & Hintergrund)"

            header.ctas:
              type: list
              label: CTA-Sections
              style: vertical
              fields:
                .headline:
                  type: text
                  label: Überschrift
                  placeholder: "Welche Module benötigst du?"

                .copy:
                  type: editor
                  label: Beschreibungstext

                .cta_button_row:
                  type: columns
                  fields:
                    col_btn_text:
                      type: column
                      fields:
                        .button_text:
                          type: text
                          label: Button-Text
                          placeholder: "Jetzt Kontakt aufnehmen"
                    col_btn_link:
                      type: column
                      fields:
                        .button_link:
                          type: text
                          label: Button-Link
                          placeholder: "#kontakt"

                .illustration_image:
                  type: mediapicker
                  label: Illustration (optional, ersetzt SVG-Grafik)
                  help: "Bild zuerst oben hochladen, dann hier auswählen"

                .background_image:
                  type: mediapicker
                  label: Hintergrundbild (optional)
                  help: "Bild zuerst oben hochladen, dann hier auswählen"

                .background_overlay:
                  type: toggle
                  label: Dunkles Overlay
                  highlight: 1
                  default: 1
                  options:
                    1: An
                    0: Aus
                  validate:
                    type: bool

        # ═══════════════════════════════════════════
        # TAB: Rosin
        # ═══════════════════════════════════════════
        tab_about:
          type: tab
          title: "Rosin"

          fields:
            about_content_divider:
              type: section
              title: "Inhalt"
              underline: true

            header.about.headline:
              type: text
              label: Überschrift
              placeholder: "Wer wir sind"

            header.about.body:
              type: editor
              label: Text

            about_quote_columns:
              type: columns
              fields:
                col_quote:
                  type: column
                  fields:
                    header.about.quote:
                      type: textarea
                      label: Zitat
                      rows: 3
                      placeholder: "z.B. Qualität ist keine Selbstverständlichkeit – sie ist eine Haltung."
                col_author:
                  type: column
                  fields:
                    header.about.quote_author:
                      type: text
                      label: Zitat-Urheber
                      placeholder: "z.B. Hans Rosin, Gründer"

            about_media_divider:
              type: section
              title: "Bild & Hintergrund"
              underline: true

            about_media:
              type: pagemedia
              label: "Bilder oder Videos hochladen"

            header.about.image:
              type: mediapicker
              label: Hauptbild (rechte Spalte)
              help: "Bild zuerst hochladen, dann hier auswählen"

            about_bg_columns:
              type: columns
              fields:
                col_bg_image:
                  type: column
                  fields:
                    header.about.background_image:
                      type: mediapicker
                      label: Hintergrundbild
                      help: "Fallback, wenn kein Video gesetzt ist"
                col_bg_video:
                  type: column
                  fields:
                    header.about.background_video:
                      type: filepicker
                      label: Hintergrundvideo
                      folder: "user://pages/01.home"
                      accept:
                        - video/mp4
                        - video/webm
                        - .mp4
                        - .webm
                      help: "Video hat Vorrang · stumm · Loop · Autoplay"

            header.about.background_overlay:
              type: toggle
              label: Dunkles Overlay
              highlight: 1
              default: 1
              options:
                1: An
                0: Aus
              validate:
                type: bool

        # ═══════════════════════════════════════════
        # TAB: Auszeichnungen
        # ═══════════════════════════════════════════
        tab_awards:
          type: tab
          title: "Auszeichnungen"

          fields:
            awards_content_divider:
              type: section
              title: "Inhalt"
              underline: true

            header.awards.headline:
              type: text
              label: Überschrift
              placeholder: "z.B. Ein ausgezeichnetes Familienunternehmen"

            awards_media:
              type: pagemedia
              label: "Badge-Bilder hochladen"

            header.awards.items:
              type: list
              label: Auszeichnungen
              style: vertical
              fields:
                .label:
                  type: text
                  label: Beschriftung
                  placeholder: "z.B. Best of Market 2026"

                .image:
                  type: mediapicker
                  label: Badge-Bild
                  help: "Bild zuerst oben hochladen, dann hier auswählen"

                .description:
                  type: textarea
                  label: Beschreibung
                  rows: 3
                  placeholder: "Kurze Erklärung zur Auszeichnung…"

            awards_bg_divider:
              type: section
              title: "Hintergrund"
              underline: true

            awards_bg_media:
              type: pagemedia
              label: "Hintergrundbild oder -video hochladen"

            awards_bg_columns:
              type: columns
              fields:
                col_bg_image:
                  type: column
                  fields:
                    header.awards.background_image:
                      type: mediapicker
                      label: Hintergrundbild
                      help: "Fallback, wenn kein Video gesetzt ist"
                col_bg_video:
                  type: column
                  fields:
                    header.awards.background_video:
                      type: filepicker
                      label: Hintergrundvideo
                      folder: "user://pages/01.home"
                      accept:
                        - video/mp4
                        - video/webm
                        - .mp4
                        - .webm
                      help: "Video hat Vorrang · stumm · Loop · Autoplay"

            header.awards.background_overlay:
              type: toggle
              label: Dunkles Overlay
              highlight: 1
              default: 1
              options:
                1: An
                0: Aus
              validate:
                type: bool

        # ═══════════════════════════════════════════
        # TAB: Team
        # ═══════════════════════════════════════════
        tab_team:
          type: tab
          title: "Team"

          fields:
            team_content_divider:
              type: section
              title: "Einleitung"
              underline: true

            team_header_columns:
              type: columns
              fields:
                col_headline:
                  type: column
                  fields:
                    header.team.headline:
                      type: text
                      label: Überschrift
                      placeholder: "Die Menschen hinter Sander"
