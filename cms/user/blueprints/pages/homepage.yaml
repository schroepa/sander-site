title: Homepage
"@extends":
  type: default
  context: "blueprints://pages"

form:
  fields:
    tabs:
      type: tabs
      active: 1

      fields:
        content:
          type: tab
          title: Content

          fields:
            # ── Section Order ──
            section_order_section:
              type: section
              title: "🔢 Reihenfolge der Sections"
              underline: true

            section_order_help:
              type: display
              label: ""
              content: "Ziehe die Einträge per **Drag & Drop** (≡) in die gewünschte Reihenfolge. Die Seite wird genau in dieser Reihenfolge aufgebaut."
              markdown: true

            header.section_order:
              type: list
              label: Abschnitte
              style: vertical
              fields:
                .section:
                  type: select
                  label: Abschnitt
                  validate:
                    required: true
                  options:
                    hero: "🎬 Hero"
                    stats: "📊 Kennzahlen"
                    menu_slider: "🎞️ Menu Slider"
                    solutions: "✅ Herausforderungen & Lösungen"
                    smart_catering: "🧑‍🍳 Smart Catering"
                    sticky_scroll: "🖱️ Sticky Scroll"
                    cta: "📣 Call to Action"
                    about: "🏢 Über uns"
                    team: "👥 Team"
                    text_section: "📄 Text Section"
                    faq: "❓ FAQ"

            # ── Hero ──
            hero_section:
              type: section
              title: "🎬 Hero"
              underline: true

            header.hero.headline:
              type: text
              label: Hero Headline
              placeholder: "z.B. Premium Catering für jeden Anlass"
              validate:
                required: true

            header.hero.spotlight_text:
              type: textarea
              label: Spotlight Background Text
              placeholder: "SMART\nCATERING"
              help: "Großer Text im Hintergrund. Neue Zeile = Zeilenumbruch."
              rows: 2

            header.hero.spotlight_line_height:
              type: text
              label: Spotlight Line Height
              placeholder: "0.9"
              help: "Zeilenhöhe des Spotlight-Texts (z.B. 0.8 = enger, 1.0 = normal)"
              default: "0.9"

            header.hero.spotlight_blur:
              type: text
              label: Spotlight Text Blur
              placeholder: "5"
              help: "Unschärfe des Hintergrundtexts in Pixel (z.B. 3 = wenig, 8 = stark)"
              default: "5"

            header.hero.spotlight_softness:
              type: text
              label: Spotlight Light Softness
              placeholder: "50"
              help: "Weichheit des Lichtkegels 0–100 (0 = scharf, 100 = sehr weich)"
              default: "50"

            header.hero.subline:
              type: text
              label: Hero Subline
              placeholder: "z.B. Qualität, die man schmeckt"

            header.hero.show_cta:
              type: toggle
              label: Show Call-to-Action Toggle
              highlight: 1
              default: 0
              options:
                1: Ja
                0: Nein
              help: "Schaltet den Call-to-Action Button unten im Hero an oder aus"

            header.hero.cta_text:
              type: text
              label: Call-to-Action Button Text
              placeholder: "z.B. Jetzt anfragen"

            header.hero.cta_link:
              type: text
              label: Call-to-Action Link
              placeholder: "#kontakt"

            header.hero.headline_scale:
              type: text
              label: Headline Scale
              placeholder: "1.0"
              help: "Vergrößert/verkleinert die Überschrift (z.B. 1.2 für 20% größer). Bleibt responsive."
              default: "1.0"

            header.hero.subline_scale:
              type: text
              label: Subline Scale
              placeholder: "1.0"
              help: "Vergrößert/verkleinert die Unterüberschrift (z.B. 0.8 für 20% kleiner). Bleibt responsive."
              default: "1.0"

            header.hero.headline_subline_spacing:
              type: text
              label: Spacing between Headline and Subline
              placeholder: "1.5"
              help: "Abstand zwischen der Überschrift und Unterüberschrift in rem. (z.B. 1.5 oder 2)"
              default: "1.5"

            # ── Stats / Kennzahlen ──
            stats_section:
              type: section
              title: "📊 Kennzahlen"
              underline: true

            header.stats.items:
              type: list
              label: Kennzahlen
              style: vertical
              fields:
                .value:
                  type: number
                  label: Zahlenwert
                  placeholder: "50"
                  validate:
                    required: true

                .suffix:
                  type: text
                  label: Suffix
                  placeholder: "+"
                  help: "Zeichen nach der Zahl, z.B. '+' oder '%'"

                .separator:
                  type: toggle
                  label: Tausender-Trennzeichen
                  highlight: 1
                  default: 0
                  options:
                    1: Ja
                    0: Nein
                  help: "Aktivieren für Zahlen wie 2.500"

                .label:
                  type: text
                  label: Bezeichnung
                  placeholder: "Jahre Erfahrung"
                  validate:
                    required: true

            # ── Solutions ──
            solutions_section:
              type: section
              title: "✅ Herausforderungen & Lösungen"
              underline: true

            header.solutions.headline:
              type: text
              label: Section Headline
              placeholder: "Deine Herausforderung - Unsere Lösungen"

            header.solutions.subline:
              type: text
              label: Section Subline
              placeholder: "Hier werden Sie geholfen"

            header.solutions.items:
              type: list
              label: Challenge / Solution Pairs
              style: vertical
              fields:
                .challenge_title:
                  type: text
                  label: Challenge Title
                  placeholder: "z.B. Küche kaputt oder nicht vorhanden?"

                .challenge_text:
                  type: textarea
                  label: Challenge Description
                  rows: 2
                  placeholder: "Beschreiben Sie die Herausforderung"

                .solution_title:
                  type: text
                  label: Solution Title
                  placeholder: "z.B. Smart Catering fängt genau das ab."

                .solution_text:
                  type: textarea
                  label: Solution Description
                  rows: 2
                  placeholder: "Beschreiben Sie die Lösung"

            # ── Content Sections ──
            content_sections:
              type: section
              title: "📝 Content Sections"
              underline: true

            header.sections:
              type: list
              label: Content Sections
              style: vertical
              fields:
                .title:
                  type: text
                  label: Section Title

                .body:
                  type: textarea
                  label: Section Content
                  rows: 5

                .image:
                  type: filepicker
                  label: Section Image (optional)
                  folder: "user://pages/01.home"
                  accept:
                    - image/*

                .tags:
                  type: selectize
                  label: Tags (Optional)
                  help: "Kommagetrennte Tags eingeben (z.B. Food, Events)"
                  classes: fancy
                  validate:
                    type: commalist

            # ── Menu Slider ──
            menu_slider_section:
              type: section
              title: "🎞️ Menu Slider"
              underline: true

            header.menu_slider.headline:
              type: text
              label: Section Headline
              placeholder: "z.B. Unsere Menülinien im Überblick"

            menu_slider_media:
              type: pagemedia
              label: "Slider Bilder hochladen"

            header.menu_slider.items:
              type: list
              label: Slides
              style: vertical
              fields:
                .title:
                  type: text
                  label: Slide Titel
                  placeholder: "z.B. Regionale Küche"
                  validate:
                    required: true

                .subtitle:
                  type: text
                  label: Slide Untertitel
                  placeholder: "z.B. Frisch aus der Region. Traditionell modern."

                .image:
                  type: mediapicker
                  label: Bild auswählen
                  help: "Wähle ein über 'Slider Bilder hochladen' hochgeladenes Bild aus"

            # ── Smart Catering ──
            smart_catering_section:
              type: section
              title: "🧑‍🍳 Smart Catering"
              underline: true

            header.smart_catering.headline:
              type: text
              label: Section Headline
              placeholder: "Verantwortung & Entscheidungsdruck"

            header.smart_catering.title:
              type: text
              label: Section Title
              placeholder: "SMART CATERING"

            header.smart_catering.subline:
              type: text
              label: Section Subline
              placeholder: "Intelligent gelöst. Köstlich geliefert."

            header.smart_catering.columns:
              type: list
              label: Columns
              style: vertical
              fields:
                .title:
                  type: text
                  label: Column Title
                  placeholder: "z.B. Smart Catering"

                .subline:
                  type: text
                  label: Column Subtitle
                  placeholder: "z.B. Hauptverpflegung"

                .accordions:
                  type: list
                  label: Accordions
                  style: vertical
                  fields:
                    .title:
                      type: text
                      label: Accordion Title
                      placeholder: "z.B. Menükompositionen"

                    .content:
                      type: textarea
                      classes: editor-trumbowyg
                      label: Description Content (Optional)

                    .tags:
                      type: selectize
                      label: Tags (Optional)
                      help: "Kommagetrennte Tags eingeben (z.B. Food, Events)"
                      classes: fancy
                      validate:
                        type: commalist

                    .cards:
                      type: list
                      label: Nested Cards (Optional)
                      style: vertical
                      fields:
                        .title:
                          type: text
                          label: Card Title

                        .text:
                          type: textarea
                          label: Card Text
                          rows: 3

            # ── Sticky Scroll ──
            sticky_scroll_section:
              type: section
              title: "🖱️ Sticky Scroll"
              underline: true

            header.sticky_scroll.headline:
              type: text
              label: Section Headline
              placeholder: "Was ist deine Herausforderung?"

            header.sticky_scroll.subline:
              type: textarea
              label: Section Subline
              rows: 3
              placeholder: "Accumsan sapien ullamcorper massa dolor sed..."

            header.sticky_scroll.items:
              type: list
              label: Scroll Items
              style: vertical
              fields:
                .dropdown_label:
                  type: text
                  label: Dropdown Label
                  placeholder: "Infrastrukturdefizit"

                .title:
                  type: text
                  label: Card Title
                  placeholder: "Küche Kaputt oder nicht vorhanden?"

                .subtitle:
                  type: text
                  label: Card Subtitle
                  placeholder: "Veraltete oder fehlende Infrastruktur macht Versorgung unsicher."

                .body_bold:
                  type: textarea
                  label: Bold Body Text
                  rows: 3
                  placeholder: "Keine Küche vorhanden..."

                .body_text:
                  type: textarea
                  label: Regular Body Text
                  rows: 4
                  placeholder: "Sie betrifft Organisation, Kosten..."

            # ── Call to Action ──
            cta_section:
              type: section
              title: "📣 Call to Action"
              underline: true

            header.cta.headline:
              type: text
              label: Section Headline
              placeholder: "Welche Module benötigst du?"

            header.cta.copy:
              type: textarea
              label: Section Copy Text
              rows: 3
              placeholder: "Reibungslose Implementierung mit Personalmanagement..."

            header.cta.button_text:
              type: text
              label: Button Text
              placeholder: "Jetzt Kontakt aufnehmen"

            header.cta.button_link:
              type: text
              label: Button Link
              placeholder: "#kontakt"

            # ── Über uns ──
            about_section:
              type: section
              title: "🏢 Über uns"
              underline: true

            header.about.headline:
              type: text
              label: Headline
              placeholder: "Wer wir sind"

            header.about.body:
              type: textarea
              label: Body Text
              rows: 5
              placeholder: "Sander Betriebsgastronomie steht seit über 50 Jahren..."

            header.about.background_image:
              type: filepicker
              label: Hintergrundbild (optional)
              folder: "user://pages/01.home"
              accept:
                - image/*
              help: "Optionales Hintergrundbild hinter dem Text"

            about_media:
              type: pagemedia
              label: "Bilder für 'Über uns' hochladen"

            header.about.image:
              type: mediapicker
              label: Bild (rechte Spalte)
              help: "Bild zuerst über 'Bilder hochladen' hochladen, dann hier auswählen. Wird neben dem Beschreibungstext angezeigt."

            # ── Team ──
            team_section:
              type: section
              title: "👥 Team"
              underline: true

            header.team.headline:
              type: text
              label: Headline
              placeholder: "Die Menschen hinter Sander"

            header.team.subline:
              type: text
              label: Subline
              placeholder: "Erfahrung, Leidenschaft und echtes Gastgeber-Herz."

            team_media:
              type: pagemedia
              label: "Team-Fotos hochladen"

            header.team.items:
              type: list
              label: Teammitglieder
              style: vertical
              fields:
                .name:
                  type: text
                  label: Name
                  placeholder: "z.B. Michael Sander"
                  validate:
                    required: true

                .role:
                  type: text
                  label: Funktion / Position
                  placeholder: "z.B. Geschäftsführer"

                .bio:
                  type: textarea
                  label: Kurzbeschreibung (optional)
                  rows: 3
                  placeholder: "Über 30 Jahre Erfahrung in der Gemeinschaftsverpflegung..."

                .image:
                  type: mediapicker
                  label: Profilfoto (optional)
                  help: "Bild zuerst über 'Team-Fotos hochladen' hochladen, dann hier auswählen"

            # ── Text Section ──
            text_section_section:
              type: section
              title: "📄 Text Section"
              underline: true

            header.text_section.headline:
              type: text
              label: Überschrift
              placeholder: "z.B. Gemeinsam Qualität gestalten."

            header.text_section.background_image:
              type: filepicker
              label: Hintergrundbild (optional)
              folder: "user://pages/01.home"
              accept:
                - image/*
              help: "Optional: Hintergrundbild hinter dem Text (wird durch einen halbtransparenten Overlay abgedunkelt)"

            header.text_section.paragraphs:
              type: list
              label: Textabsätze
              style: vertical
              help: "Jeder Eintrag wird als eigener Absatz dargestellt."
              fields:
                .text:
                  type: textarea
                  label: Absatz
                  rows: 4
                  placeholder: "Texto del párrafo…"

            # ── FAQ Section ──
            faq_section_section:
              type: section
              title: "❓ FAQ"
              underline: true

            header.faq.headline:
              type: text
              label: Überschrift
              placeholder: "z.B. Häufig gestellte Fragen"

            header.faq.items:
              type: list
              label: Fragen & Antworten
              style: vertical
              fields:
                .question:
                  type: text
                  label: Frage
                  placeholder: "z.B. Wie funktioniert die Lieferung?"
                  validate:
                    required: true

                .answer:
                  type: textarea
                  label: Antwort
                  classes: editor-trumbowyg
                  rows: 4
                  placeholder: "Antwort auf die Frage..."
