title: PLUGIN_ADMIN.SITE
form:
  fields:
    header:
      type: section
      title: Header & Navigation
      underline: true

      fields:
        header.logo:
          type: text
          label: Logo URL (z.B. /assets/logo.svg)
          default: "/assets/39331785a20d94ae55004c6822ef1dd1b9eba1e7.svg"

        header.cta_text:
          type: text
          label: Button Text
          default: "Kontakt aufnehmen"

        header.cta_link:
          type: text
          label: Button Link
          default: "/#kontakt"

        header.menus:
          type: list
          label: Hauptnavigation
          style: vertical
          fields:
            .label:
              type: text
              label: Label (z.B. Lösungen)
            .link:
              type: text
              label: Link URL (z.B. /#loesungen)
            .submenus:
              type: list
              label: Dropdown-Einträge (optional)
              style: vertical
              fields:
                .label:
                  type: text
                  label: Label
                .link:
                  type: text
                  label: Link URL

    footer:
      type: section
      title: Footer
      underline: true

      fields:
        footer.company.address:
          type: text
          label: Adresse
          placeholder: "Musterstraße 1, 12345 Berlin"

        footer.company.email:
          type: text
          label: E-Mail-Adresse
          placeholder: "info@sander-catering.de"

        footer.company.phone:
          type: text
          label: Telefonnummer
          placeholder: "+49 30 123456789"

        footer.heading_internal:
          type: text
          label: Spaltenüberschrift – Interne Links
          placeholder: "Seiten"
          default: "Seiten"

        footer.heading_universe:
          type: text
          label: Spaltenüberschrift – Sander Universum
          placeholder: "Sander Universum"
          default: "Sander Universum"

        footer.heading_social:
          type: text
          label: Spaltenüberschrift – Social Media
          placeholder: "Folge uns"
          default: "Folge uns"

        footer.internal_links:
          type: list
          label: Interne Links (Seiten & DSGVO)
          style: vertical
          fields:
            .label:
              type: text
              label: Bezeichnung
            .link:
              type: text
              label: Link URL (z.B. /#kontakt oder /impressum)

        footer.universe_links:
          type: list
          label: Sander Universum Links
          style: vertical
          fields:
            .label:
              type: text
              label: Bezeichnung
            .link:
              type: text
              label: Link URL
            .external:
              type: toggle
              label: Externer Link (öffnet in neuem Tab)
              default: true

        footer.socials:
          type: list
          label: Social Media Links
          style: vertical
          fields:
            .platform:
              type: text
              label: Plattform (z.B. LinkedIn, Instagram)
            .link:
              type: text
              label: Link URL
            .icon:
              type: filepicker
              label: Icon (SVG/Bild, optional)
              folder: "theme://assets"

        footer.copyright:
          type: text
          label: Copyright-Text
          default: "© 2025 Sander Catering GmbH"
